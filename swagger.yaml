openapi: 3.0.0
info:
  title: TaskFlow API
  version: 1.0.0
  description: REST API with JWT auth and role-based access

servers:
  - url: http://localhost:5000/api/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        '201': { description: User created }
        '409': { description: Email already exists }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200': { description: Returns JWT token }

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: User profile }

  /tasks:
    get:
      tags: [Tasks]
      summary: Get tasks (user sees own, admin sees all)
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: List of tasks }
    post:
      tags: [Tasks]
      summary: Create a new task
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                status: { type: string, enum: [pending, in-progress, done] }
      responses:
        '201': { description: Task created }

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get a task by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Task object }
    put:
      tags: [Tasks]
      summary: Update a task
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                status: { type: string }
      responses:
        '200': { description: Updated task }
    delete:
      tags: [Tasks]
      summary: Delete a task
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Task deleted }